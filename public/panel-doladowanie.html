<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pakiet i doładowanie — Szepty Anielskie</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/client.css" />
  </head>
  <body class="page-panel page-panel--simple">
    <header class="site-top">
      <div class="site-top-inner">
        <a class="logo" href="/panel.html">Szepty Anielskie</a>
        <nav class="nav-actions nav-actions--panel">
          <a class="link-panel-topup-back" href="/panel.html">← Wróć do rozmów</a>
          <span class="top-meta top-meta--strong" id="who"></span>
          <span class="top-meta" id="bal-line"></span>
          <button type="button" class="btn btn-outline" id="logout">Wyloguj</button>
        </nav>
      </div>
    </header>

    <main class="panel-simple-main">
      <div class="panel-simple-card">
        <h1>Pakiet wiadomości i doładowanie</h1>
        <p class="panel-simple-lead">
          Wybierz pakiet, aby doładować konto i kontynuować rozmowy z naszymi medium.
        </p>
        <p class="panel-payment-note" id="payment-gateway-note" hidden></p>
        <div id="gateway-picker" class="gateway-picker" hidden></div>
        <p class="top-meta" id="pkg-note"></p>

        <div class="promo-input-row" id="promo-section" style="margin-bottom:1rem">
          <label class="promo-input-label" for="promo-code-input">Masz kod promocyjny?</label>
          <div class="promo-input-wrap">
            <input type="text" id="promo-code-input" class="promo-input" placeholder="Wpisz kod…" autocomplete="off" style="text-transform:uppercase" maxlength="40" />
            <button type="button" class="btn btn-outline promo-apply-btn" id="promo-apply-btn">Zastosuj</button>
          </div>
          <p class="promo-status" id="promo-status" hidden></p>
        </div>

        <div class="pkg-buttons" id="pkg"></div>
        <p class="form-error" id="pkg-err" hidden></p>
        <p class="top-meta" style="margin-top: 1.25rem">
          <a href="/informacje-ceny.html">Informacje o cenach</a>
        </p>
      </div>
    </main>

    <script type="module" src="/js/panel-doladowanie.js"></script>
  </body>
</html>
