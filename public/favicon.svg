<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="ball" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#e8d5ff"/>
      <stop offset="45%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow -->
  <circle cx="32" cy="27" r="26" fill="url(#glow)"/>
  <!-- Ball -->
  <circle cx="32" cy="27" r="22" fill="url(#ball)"/>
  <!-- Shine -->
  <ellipse cx="24" cy="18" rx="7" ry="5" fill="white" opacity="0.25" transform="rotate(-20 24 18)"/>
  <circle cx="22" cy="16" r="3" fill="white" opacity="0.35"/>
  <!-- Stars inside -->
  <circle cx="38" cy="28" r="1.5" fill="#fde68a"/>
  <circle cx="28" cy="32" r="1" fill="#fde68a" opacity="0.8"/>
  <circle cx="34" cy="20" r="1" fill="#fde68a" opacity="0.7"/>
  <circle cx="26" cy="24" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="40" cy="22" r="0.8" fill="white" opacity="0.5"/>
  <!-- Base stem -->
  <ellipse cx="32" cy="51" rx="10" ry="4" fill="#581c87" opacity="0.5"/>
  <rect x="27" y="47" width="10" height="6" rx="3" fill="#6b21a8"/>
  <!-- Connect ball to base -->
  <rect x="30" y="48" width="4" height="3" fill="#7e22ce"/>
</svg>
