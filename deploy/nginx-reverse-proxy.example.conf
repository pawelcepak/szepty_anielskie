# Przykład dla nginx (Linux VPS). NIE kopiuj ślepo — podmień server_name, ścieżki certów.
# Certyfikat: np. certbot certonly --nginx -d twoja-domena.pl
# Node: npm start / pm2 — aplikacja nasłuchuje np. 127.0.0.1:3000 (PORT w .env)

upstream portal_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name twoja-domena.pl www.twoja-domena.pl;

    ssl_certificate     /etc/letsencrypt/live/twoja-domena.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twoja-domena.pl/privkey.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass         http://portal_node;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

server {
    listen 80;
    server_name twoja-domena.pl www.twoja-domena.pl;
    return 301 https://$host$request_uri;
}
