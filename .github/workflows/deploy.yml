name: Deploy to VPS

on:
  push:
    branches:
      - redesign-wyglad-magiczny

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/szepty
            git pull
            npm install --production --silent
            pm2 restart szepty --update-env
            echo "Deploy zakończony: $(date)"
